function genCode(){
  const letters='ABCDEFGHJKLMNPQRSTUVWXYZ';
  let c='';
  for(let i=0;i<4;i++) c+=letters[Math.floor(Math.random()*letters.length)];
  return c;
}

function detachRoomListener(){
  if(roomListener){ off(roomListener.ref, 'value', roomListener.cb); roomListener=null; }

function shuffleArr(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function makeQuestion(w, sameTypePool){
  const pool = sameTypePool.filter(x=>x.ar!==w.ar).map(x=>x.ar);
  const distractors = shuffleArr(pool).slice(0,3);
  const options = shuffleArr([w.ar, ...distractors]);
  const correct = options.indexOf(w.ar);
  return { q: `ما معنى ${w.fr}؟`, word: w.fr, options, correct };
}
function generateCampaign(){
  const verbs = shuffleArr(WORD_BANK.filter(w=>w.type==='verb'));
  const nouns = shuffleArr(WORD_BANK.filter(w=>w.type==='noun'));
  const adjs  = shuffleArr(WORD_BANK.filter(w=>w.type==='adj'));
  function chunk3(arr, sizes){ let out=[], i=0; for(const s of sizes){ out.push(arr.slice(i,i+s)); i+=s; } return out; }
  const vChunks = chunk3(verbs, [7,7,7]);
  const nChunks = chunk3(nouns, [7,7,7]);
  const aChunks = chunk3(adjs, [6,6,6]);
  const campaignObj = {};
  LEVELS.forEach((lvl, i)=>{
    const words = shuffleArr([...vChunks[i], ...nChunks[i], ...aChunks[i]]);
    campaignObj[lvl.key] = words.map(w=>{
      const typePool = WORD_BANK.filter(x=>x.type===w.type);
      return makeQuestion(w, typePool);
    });
  });
  return campaignObj;
}

// ---------- audio: speech + tones ----------
let cachedVoices = [];
function loadVoices(){ if('speechSynthesis' in window) cachedVoices = window.speechSynthesis.getVoices(); }
if('speechSynthesis' in window){ loadVoices(); window.speechSynthesis.onvoiceschanged = loadVoices; }
function unlockAudio(){
  try{ getAudioCtx(); }catch(e){}
  if('speechSynthesis' in window){
    try{ const u = new SpeechSynthesisUtterance(' '); u.volume=0; window.speechSynthesis.speak(u); }catch(e){}
  }
}
function speakWord(text){
  if(!('speechSynthesis' in window)) return;
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'fr-FR'; u.rate = 0.9;
    const frVoice = cachedVoices.find(v=>v.lang && v.lang.toLowerCase().startsWith('fr'));
    if(frVoice) u.voice = frVoice;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ return null; } }
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(freq, start, duration, type='sine', vol=0.22){
  const ctx = getAudioCtx(); if(!ctx) return;
  const osc = ctx.createOscillator(); const gain = ctx.createGain();
  osc.type = type; osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, ctx.currentTime+start);
  gain.gain.linearRampToValueAtTime(vol, ctx.currentTime+start+0.015);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+start+duration);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(ctx.currentTime+start); osc.stop(ctx.currentTime+start+duration+0.05);
}
function playCorrectSound(){ playTone(523.25,0,0.16,'sine',0.22); playTone(659.25,0.09,0.16,'sine',0.22); playTone(783.99,0.18,0.28,'sine',0.24); }

async function createRoom(){
  const errEl = document.getElementById('setupError');
  const btn = document.querySelector('#app .btn-primary');
  errEl.textContent = '';
  if(btn){ btn.textContent = 'كنجهز البطولة...'; btn.disabled = true; }
  try{
    roomCode = genCode();
    campaign = generateCampaign();
    scoredQuestions = new Set();
    await set(ref(db, 'campaigns/'+roomCode), campaign);
    await set(ref(db, 'rooms/'+roomCode), { levelIdx:0, currentIndex:-1, state:'lobby', ended:false });
    await set(ref(db, 'scores/'+roomCode), {});
    renderHostLobby();
  }catch(e){
    errEl.textContent = '⚠️ وقع خطأ: ' + (e && e.message ? e.message : e);
    if(btn){ btn.textContent = 'إنشاء البطولة ▶'; btn.disabled = false; }
  }
}

async function hostStartLevel(levelIdx){

async function hostAdvanceToQuestion(levelIdx, idx){
  try{
    const lvl = LEVELS[levelIdx];
    const qs = campaign[lvl.key];
    if(idx >= qs.length){
      await update(ref(db, 'rooms/'+roomCode), { levelIdx, currentIndex:idx, state:'levelResult', ended:false });
      await renderLevelResult(levelIdx, true);
      return;
    }
    await update(ref(db, 'rooms/'+roomCode), { levelIdx, currentIndex:idx, state:'question', ended:false });
    renderHostQuestionLive(levelIdx, idx);
  }catch(e){
    showFbError(e, ()=>hostAdvanceToQuestion(levelIdx, idx));
  }
}

function renderHostQuestionLive(levelIdx, idx){
  const lvl = LEVELS[levelIdx];

  render(`

    </div>
    <div class="card center">
      <div class="muted" id="answerCount">كنتسناو التلاميذ يجاوبو...</div>
      <button class="btn-primary" id="revealBtn" disabled onclick="window.hostRevealAndWait(${levelIdx}, ${idx})">عرض النتيجة ▶</button>
      <button class="btn-secondary" style="font-size:.8rem;padding:8px;" onclick="window.hostRevealAndWait(${levelIdx}, ${idx})">تجاوز وعرض النتيجة الآن (إذا كان تلميذ غايب) ⏭</button>
    </div>
    <div class="card">
      <div class="sub" style="margin-bottom:4px;">النقط الحية 👁️ (التلاميذ ما كيشوفوهاش دابا)</div>
      <div id="liveBoard"></div>
    </div>
  `);
  // live join count
  onValue(ref(db, 'joins/'+roomCode), (snap)=>{
    const total = Object.keys(snap.val()||{}).length;
    onValue(ref(db, 'answers/'+roomCode+'/'+lvl.key+'/'+idx), (asnap)=>{
      const answeredCount = Object.keys(asnap.val()||{}).length;
      const cntEl = document.getElementById('answerCount');
      const btn = document.getElementById('revealBtn');
      if(cntEl) cntEl.textContent = `${answeredCount} / ${total} جاوبو`;
      if(btn){
        if(total>0 && answeredCount>=total){ btn.disabled=false; btn.textContent='✅ الكل جاوب - عرض النتيجة ▶'; }
        else { btn.disabled=true; btn.textContent='عرض النتيجة ▶'; }
      }
    }, {onlyOnce:false});
  }, {onlyOnce:false});
  onValue(ref(db, 'scores/'+roomCode), (snap)=>{
    const scores = snap.val()||{};
    const ranked = Object.entries(scores).sort((a,b)=>(b[1][lvl.key]||0)-(a[1][lvl.key]||0));
    const el = document.getElementById('liveBoard');
    if(!el) return;
    el.innerHTML = ranked.length
      ? ranked.map((r,i)=>`<div class="leader-row"><span><span class="rank">${i+1}.</span>${r[0]}</span><b>${Math.min(r[1][lvl.key]||0,20)} / 20</b></div>`).join('')
      : '<div class="muted">مازال حتى واحد ما جاوب</div>';
  });
}

async function hostRevealAndWait(levelIdx, idx){
  const btns = document.querySelectorAll('#app button');
  btns.forEach(b=>b.disabled=true);
  try{
    const lvl = LEVELS[levelIdx];
    const q = campaign[lvl.key][idx];
    const scoreKey = lvl.key+':'+idx;
    const scoresSnap = await get(ref(db, 'scores/'+roomCode));
    const scores = scoresSnap.val() || {};
    if(!scoredQuestions.has(scoreKey)){
      const ansSnap = await get(ref(db, 'answers/'+roomCode+'/'+lvl.key+'/'+idx));
      const answers = ansSnap.val() || {};
      for(const name of Object.keys(answers)){
        const ans = answers[name];
        if(!scores[name]) scores[name] = {bronze:0,silver:0,gold:0};
        if(ans.choice === q.correct) scores[name][lvl.key] = (scores[name][lvl.key]||0) + 1;
      }
      await set(ref(db, 'scores/'+roomCode), scores);
      scoredQuestions.add(scoreKey);
    }
    await update(ref(db, 'rooms/'+roomCode), { levelIdx, currentIndex:idx, state:'reveal', ended:false });

    const ranked = Object.entries(scores).sort((a,b)=>(b[1][lvl.key]||0)-(a[1][lvl.key]||0));
    const isLastQ = idx >= campaign[lvl.key].length-1;
    render(`
      <div class="center"><span class="level-badge ${lvl.cls}">${lvl.emoji} ${lvl.name}</span></div>
      <div class="qcount">سؤال ${idx+1} / 20</div>
      <h1>الجواب الصحيح ✅</h1>
      <div class="card center">
        <div style="font-weight:700;margin-bottom:8px;">${q.q}</div>
        <div style="color:#4ade80;font-weight:800;font-size:1.1rem;">${q.options[q.correct]}</div>
      </div>
      <div class="card">
        <div class="sub" style="margin-bottom:4px;">الترتيب الحالي فهاد المستوى</div>
        ${ranked.map((r,i)=>`<div class="leader-row"><span><span class="rank">${i+1}.</span>${r[0]}</span><b>${Math.min(r[1][lvl.key]||0,20)} / 20</b></div>`).join('') || '<div class="muted">مازال حتى واحد ما جاوب</div>'}
        <button class="btn-primary" onclick="window.hostAdvanceToQuestion(${levelIdx}, ${idx+1})">${isLastQ ? '📊 نتيجة المستوى ▶' : 'السؤال الموالي ▶'}</button>
      </div>
    `);
  }catch(e){
    showFbError(e, ()=>hostRevealAndWait(levelIdx, idx));
  }
}

async function renderLevelResult(levelIdx, isHost){
  try{
    const lvl = LEVELS[levelIdx];
    const scoresSnap = await get(ref(db, 'scores/'+roomCode));
    const scores = scoresSnap.val() || {};
    const ranked = Object.entries(scores).sort((a,b)=>Math.min(b[1][lvl.key]||0,20)-Math.min(a[1][lvl.key]||0,20));
    const isLastLevel = levelIdx >= LEVELS.length-1;
    const meRow = !isHost ? ranked.find(r=>r[0]===playerName) : null;
    render(`
      <div class="center"><span class="level-badge ${lvl.cls}">${lvl.emoji} ${lvl.name}</span></div>
      <h1>نتائج المستوى 📊</h1>
      ${!isHost && meRow ? `<div class="card center"><div class="muted">نقطتك فهاد المستوى</div><div class="timer-ring" style="border-color:#c084fc;color:#f0abfc;">${Math.min(meRow[1][lvl.key]||0,20)}</div></div>` : ''}
      <div class="card">
        <div class="sub" style="margin-bottom:4px;">الترتيب العام</div>
        ${ranked.map((r,i)=>`<div class="leader-row ${!isHost && r[0]===playerName ? 'me':''}"><span><span class="rank">${i+1}.</span>${r[0]}</span><b>${Math.min(r[1][lvl.key]||0,20)} / 20</b></div>`).join('') || '<div class="muted">ما كاين حتى نتيجة بعد</div>'}
        ${isHost ? `<button class="btn-primary" onclick="${isLastLevel ? 'window.hostShowFinalCeremony()' : 'window.hostStartLevel('+(levelIdx+1)+')'}">${isLastLevel ? '🏆 عرض النتيجة النهائية والفائز' : 'المستوى الموالي ▶'}</button>` : `<div class="muted" style="margin-top:14px;">فانتظار الأستاذ باش يبدا المستوى الموالي...</div>`}
      </div>
    `);
  }catch(e){
    if(isHost) showFbError(e, ()=>renderLevelResult(levelIdx, isHost));
  }
}

async function hostShowFinalCeremony(){
  try{
    await update(ref(db, 'rooms/'+roomCode), { levelIdx:LEVELS.length, currentIndex:0, state:'gameEnd', ended:true });
    renderFinalCeremony(true);
  }catch(e){
    showFbError(e, hostShowFinalCeremony);
  }
}

async function renderFinalCeremony(isHost){
  try{
    const scoresSnap = await get(ref(db, 'scores/'+roomCode));
    const scores = scoresSnap.val() || {};
    const totals = Object.entries(scores).map(([name,s])=>[name, Math.min(s.bronze||0,20)+Math.min(s.silver||0,20)+Math.min(s.gold||0,20), s]);
    totals.sort((a,b)=>b[1]-a[1]);
    const winner = totals[0];
    render(`
      <h1>🎉 نتيجة البطولة النهائية 🎉</h1>
      <div class="trophy">🏆</div>
      ${winner ? `<div class="winner-name">${winner[0]}</div><div class="muted">الفائز بالبطولة! 🥇</div>` : '<div class="muted">ما كاين حتى نتيجة</div>'}
      <div class="card">
        <div class="sub" style="margin-bottom:4px;">الترتيب النهائي (مجموع 3 مستويات، على 60)</div>
        ${totals.map((r,i)=>`<div class="leader-row ${!isHost && r[0]===playerName?'me':''}"><span><span class="rank">${i+1}.</span>${i===0?'👑 ':''}${r[0]}</span><b>${r[1]} / 60</b></div>`).join('')}
      </div>
      <div class="card">
        <div class="sub" style="margin-bottom:4px;">تفاصيل حسب المستوى</div>
        ${totals.map(r=>`<div class="leader-row"><span>${r[0]}</span><span style="font-size:.8rem;">🥉${Math.min(r[2].bronze||0,20)} 🥈${Math.min(r[2].silver||0,20)} 🥇${Math.min(r[2].gold||0,20)}</span></div>`).join('')}
      </div>
      <button class="btn-secondary" onclick="window.renderHome()">${isHost ? 'بطولة جديدة' : 'رجوع للبداية'}</button>
    `);
    launchConfetti();
  }catch(e){ /* end of game, non-critical if this fails to load, offer home fallback */ 
    render(`<div class="card center"><div class="muted">وقع خطأ فتحميل النتيجة النهائية</div><button class="btn-secondary" onclick="window.renderHome()">رجوع للبداية</button></div>`);
  }
}

// ================= PLAYER =================
function goJoin(){
  role='player';
  render(`
    <h1>انضم للبطولة</h1>
    <div class="card">
      <label>الاسم ديالك</label>
      <input id="pname" placeholder="مثلا: ياسين">
      <label>كود الغرفة</label>
      <input id="pcode" placeholder="مثلا: ABCD" style="text-transform:uppercase">
      <div id="joinError" class="muted" style="color:#f87171;min-height:18px;"></div>
      <button class="btn-primary" onclick="window.joinRoom()">دخول ▶</button>
    </div>
    <button class="btn-secondary" onclick="window.renderHome()">رجوع</button>
  `);
}

async function joinRoom(){
  unlockAudio();
  const errEl = document.getElementById('joinError');
  const btn = document.querySelector('.btn-primary');
  const name = document.getElementById('pname').value.trim();
  const code = document.getElementById('pcode').value.trim().toUpperCase();
  errEl.textContent = '';
  if(!name || !code){ errEl.textContent = '⚠️ عمر الاسم والكود قبل الدخول'; return; }
  btn.textContent = 'كنتأكد من الكود...';
  btn.disabled = true;
  try{
    const campaignSnap = await get(ref(db, 'campaigns/'+code));
    if(!campaignSnap.exists()){
      errEl.textContent = '⚠️ الكود غير صحيح، تأكد منو مع الأستاذ';
      btn.textContent = 'دخول ▶'; btn.disabled = false;
      return;
    }
    campaign = campaignSnap.val();
    playerName = name; roomCode = code;
    await set(ref(db, 'joins/'+roomCode+'/'+playerName), true);
    lastSeenIndex=-1; lastSeenState=null; lastSeenLevel=-1; answered=false;
    renderPlayerWaiting();
    attachPlayerRoomListener();
  }catch(e){
    errEl.textContent = '⚠️ وقع خطأ فالاتصال: ' + (e && e.message ? e.message : e);
    btn.textContent = 'دخول ▶'; btn.disabled = false;
  }
}

function attachPlayerRoomListener(){
  detachRoomListener();
  const roomRef = ref(db, 'rooms/'+roomCode);
  const cb = (snap)=>{
    const room = snap.val();
    if(!room) return;
    if(room.state==='question' && (room.currentIndex !== lastSeenIndex || room.levelIdx !== lastSeenLevel || lastSeenState!=='question')){
      lastSeenIndex=room.currentIndex; lastSeenLevel=room.levelIdx; lastSeenState='question';
      answered=false;
      renderPlayerQuestion(room);
    } else if(room.state==='reveal' && (lastSeenState!=='reveal' || room.levelIdx!==lastSeenLevel || room.currentIndex!==lastSeenIndex)){
      lastSeenState='reveal'; lastSeenLevel=room.levelIdx; lastSeenIndex=room.currentIndex;
      renderPlayerReveal(room);
    } else if(room.state==='levelResult' && (lastSeenState!=='levelResult' || room.levelIdx!==lastSeenLevel)){
      lastSeenState='levelResult'; lastSeenLevel=room.levelIdx;
      renderLevelResult(room.levelIdx, false);
    } else if(room.state==='gameEnd' && lastSeenState!=='gameEnd'){
      lastSeenState='gameEnd';
      detachRoomListener();
      renderFinalCeremony(false);
    }
  };
  onValue(roomRef, cb);
  roomListener = {ref:roomRef, cb};
}

function renderPlayerWaiting(){
  render(`
    <h1>فانتظار الأستاذ...</h1>
    <div class="card center">
      <div class="muted">مرحبا ${playerName} 👋</div>
      <div class="muted">البطولة فيها 3 مستويات (🥉🥈🥇)، كل واحد 20 سؤال</div>
    </div>
  `);
}

function renderPlayerQuestion(room){
  const lvl = LEVELS[room.levelIdx];
  const q = campaign[lvl.key][room.currentIndex];
  render(`
    <div class="center"><span class="level-badge ${lvl.cls}">${lvl.emoji} ${lvl.name}</span></div>
    <div class="qcount">سؤال ${room.currentIndex+1} / 20</div>
    <div class="card">
      <div class="center" style="font-size:1.15rem;font-weight:700;margin-bottom:10px;">
        ${q.q}
        <button id="repeatBtn" class="btn-secondary" style="width:auto;display:inline-block;padding:8px 14px;margin-right:8px;">🔊</button>
      </div>
      <div id="opts"></div>
      <button class="btn-primary" id="confirmBtn" disabled>تأكيد الإجابة ✅</button>
    </div>
  `);
  let selectedIdx = null;
  const optsEl = document.getElementById('opts');
  const confirmBtn = document.getElementById('confirmBtn');
  q.options.forEach((opt,i)=>{
    const b=document.createElement('button');
    b.className='qopt';
    b.textContent=opt;
    b.onclick=()=>{
      if(answered) return;
      document.querySelectorAll('.qopt').forEach(x=>x.classList.remove('picked'));
      b.classList.add('picked');
      selectedIdx = i;
      confirmBtn.disabled = false;
    };
    optsEl.appendChild(b);
  });
  confirmBtn.onclick = ()=>{
    if(selectedIdx===null) return;
    const btnEl = document.querySelectorAll('.qopt')[selectedIdx];
    submitAnswer(selectedIdx, btnEl, lvl.key, room.currentIndex, q.correct);
  };
  document.getElementById('repeatBtn').onclick = ()=> speakWord(q.word);
  speakWord(q.word);
}

async function submitAnswer(choiceIdx, btnEl, levelKey, idx, correctIdx){
  if(answered) return;
  answered = true;
  document.querySelectorAll('.qopt').forEach(b=>b.disabled=true);
  const confirmBtn = document.getElementById('confirmBtn');
  if(confirmBtn) confirmBtn.disabled = true;
  btnEl.classList.add('picked');
  const isCorrect = choiceIdx === correctIdx;
  if(isCorrect) playCorrectSound(); else playWrongSound();
  try{
    await set(ref(db, 'answers/'+roomCode+'/'+levelKey+'/'+idx+'/'+playerName), { choice: choiceIdx, timeMs: Date.now() });
    const div = document.createElement('div');
    div.className='muted'; div.style.marginTop='14px';
    div.style.color = isCorrect ? '#4ade80' : '#f87171';
    div.style.fontWeight='800';
    div.textContent = isCorrect ? '✅ إجابة صحيحة!' : '❌ إجابة خاطئة';
    document.getElementById('opts').appendChild(div);
  }catch(e){
    answered = false;
    document.querySelectorAll('.qopt').forEach(b=>b.disabled=false);
    if(confirmBtn) confirmBtn.disabled = false;
    btnEl.classList.remove('picked');
    const div = document.createElement('div');
    div.className='muted'; div.style.marginTop='14px'; div.style.color='#f87171';
    div.textContent='⚠️ ما توصلش الجواب، جرب دوس من جديد';
    document.getElementById('opts').appendChild(div);
  }
}

function renderPlayerReveal(room){
  const lvl = LEVELS[room.levelIdx];
  const q = campaign[lvl.key][room.currentIndex];
  render(`
    <div class="center"><span class="level-badge ${lvl.cls}">${lvl.emoji} ${lvl.name}</span></div>
    <h1>الجواب الصحيح ✅</h1>
    <div class="card center">
      <div style="font-weight:700;">${q.q}</div>
      <div style="color:#4ade80;font-weight:800;font-size:1.1rem;margin-top:6px;">${q.options[q.correct]}</div>
    </div>
    <div class="muted">فانتظار السؤال الموالي...</div>
  `);
}

// expose functions used by inline onclick handlers
window.renderHome = renderHome;
window.goHostSetup = goHostSetup;
window.createRoom = createRoom;
window.hostStartLevel = hostStartLevel;
window.hostAdvanceToQuestion = hostAdvanceToQuestion;
window.hostRevealAndWait = hostRevealAndWait;
window.hostShowFinalCeremony = hostShowFinalCeremony;
window.goJoin = goJoin;
window.joinRoom = joinRoom;

renderHome();

// register service worker for installability
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
